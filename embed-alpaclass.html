<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exemplo iframe — Suporte Mindmaster (Alpaclass)</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        font-family: system-ui, sans-serif;
        background: #f4f6f8;
      }
      p {
        margin: 0 0 10px;
        font-size: 0.875rem;
        color: #444;
      }
    </style>
  </head>
  <body>
    <p>Exemplo de incorporação. No Alpaclass, use só a tag <code>&lt;iframe&gt;</code> abaixo (ou copie do comentário no código-fonte).</p>

    <!-- Cole no Alpaclass (bloco HTML) apenas o que está entre IFRAME-START e IFRAME-END -->
    <!-- IFRAME-START -->
    <iframe
      src="https://project-oczf7.vercel.app/"
      title="Fale com o Suporte — Mindmaster"
      width="100%"
      height="620"
      style="border: 0; display: block; max-width: 100%; min-height: 560px;"
      loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
    <!-- IFRAME-END -->
  </body>
</html>
